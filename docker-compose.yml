version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      JWT_SECRET: "dev-secret-nao-use-em-producao"
      DATABASE_PATH: "/data/linkvault.db"
    volumes:
      - linkvault-data:/data
    restart: unless-stopped

volumes:
  linkvault-data:
    driver: local
